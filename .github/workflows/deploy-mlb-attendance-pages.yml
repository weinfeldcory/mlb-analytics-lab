name: Deploy MLB Attendance App

on:
  push:
    branches: ["main"]
    paths:
      - "projects/mlb-attendance-app/**"
      - ".github/workflows/deploy-mlb-attendance-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/mlb-attendance-app
    env:
      EXPO_PUBLIC_APP_DATA_BACKEND: hosted
      EXPO_PUBLIC_SUPABASE_URL: ${{ vars.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      EXPO_PUBLIC_BASE_URL: /sports-games-and-mlb-analytics-lab
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build web export
        run: corepack pnpm run build:web

      - name: Add SPA fallback
        run: cp apps/mobile/dist/index.html apps/mobile/dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: projects/mlb-attendance-app/apps/mobile/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
